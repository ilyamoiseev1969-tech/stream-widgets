<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:transparent;color:#fff;font-family:Arial,sans-serif;overflow:hidden;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;}
  .widget{width:400px;padding:20px;background:rgba(10,10,20,0.85);border-radius:20px;border:2px solid gold;box-shadow:0 0 30px rgba(255,215,0,0.4);}
  h2{text-align:center;font-size:28px;color:gold;margin-bottom:15px;text-shadow:0 0 10px gold;}
  .entry{display:flex;align-items:center;background:rgba(255,255,255,0.05);margin-bottom:10px;padding:10px 15px;border-radius:10px;}
  .place{font-size:30px;font-weight:700;width:40px;}
  .place-1{color:#ffd700;}.place-2{color:silver;}.place-3{color:#cd7f32;}
  .name{flex:1;font-size:24px;font-weight:600;margin-left:10px;}
  .sum{font-size:24px;color:gold;font-weight:700;}
</style>
</head>
<body>
<div class="widget">
  <h2>🏆 Топ донатеров</h2>
  <div id="board"></div>
</div>
<script>
  // Твои CSV-ссылки
  const CSV_URLS = [
    'https://docs.google.com/spreadsheets/d/e/2PACX-1vSt7iz-7l-uCsjQYfZXkskIrNthe20Mxs0f9sUxEFI8QihTXOSGpNsjmC4vRE_OdXoVclNRNgIT7RTm/pub?gid=865616681&single=true&output=csv',
    'https://docs.google.com/spreadsheets/d/e/2PACX-1vSt7iz-7l-uCsjQYfZXkskIrNthe20Mxs0f9sUxEFI8QihTXOSGpNsjmC4vRE_OdXoVclNRNgIT7RTm/pub?gid=1115599664&single=true&output=csv'
  ];

  const board = document.getElementById('board');

  function parseCSV(text) {
    const rows = [];
    let curRow = [];
    let curField = '';
    let quoted = false;
    for (const ch of text) {
      if (quoted) {
        if (ch === '"') { quoted = false; }
        else { curField += ch; }
      } else {
        if (ch === '"') { quoted = true; }
        else if (ch === ',') { curRow.push(curField.trim()); curField = ''; }
        else if (ch === '\n' || ch === '\r') {
          if (curField || curRow.length) {
            curRow.push(curField.trim());
            rows.push(curRow);
            curRow = [];
            curField = '';
          }
          // пропускаем \r\n
          if (ch === '\r' && text[text.indexOf(ch)+1] === '\n') continue;
        } else { curField += ch; }
      }
    }
    if (curField || curRow.length) {
      curRow.push(curField.trim());
      rows.push(curRow);
    }
    return rows.filter(r => r.some(f => f !== ''));
  }

  async function fetchCSV(url) {
    const resp = await fetch(url + '?t=' + Date.now(), {cache: 'no-cache'});
    const text = await resp.text();
    return parseCSV(text);
  }

  function buildTop(allDonations) {
    const totals = {};
    allDonations.forEach(d => {
      if (!d.name || isNaN(d.amount)) return;
      totals[d.name] = (totals[d.name] || 0) + d.amount;
    });
    return Object.entries(totals)
      .sort((a,b) => b[1]-a[1])
      .slice(0,3)
      .map(([name,sum]) => ({name,sum}));
  }

  function render(data) {
    if (!data.length) {
      board.innerHTML = '<div style="text-align:center;padding:20px;">Нет данных</div>';
      return;
    }
    const medals = ['🥇','🥈','🥉'];
    let html = '';
    data.forEach((item,i) => {
      html += `<div class="entry"><span class="place place-${i+1}">${medals[i]}</span><span class="name">${item.name}</span><span class="sum">${item.sum.toLocaleString()} ₽</span></div>`;
    });
    board.innerHTML = html;
  }

  async function update() {
    try {
      const results = await Promise.all(CSV_URLS.map(fetchCSV));
      const allDonations = [];
      results.forEach(rows => {
        // пропускаем заголовок
        let start = 0;
        if (rows.length && rows[0].some(cell => /имя|ник|name|сумма|amount/i.test(cell))) start = 1;
        for (let i = start; i < rows.length; i++) {
          const row = rows[i];
          const name = row[1]?.trim();
          const amount = parseFloat(row[2]?.replace(',', '.'));
          if (name && !isNaN(amount) && amount > 0) {
            allDonations.push({name, amount});
          }
        }
      });
      const top = buildTop(allDonations);
      render(top);
    } catch(e) {
      console.error(e);
    }
  }

  update();
  setInterval(update, 5000);
</script>
</body>
</html>
