<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:transparent;color:#fff;font-family:Arial,sans-serif;overflow:hidden;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;}
  .widget{width:400px;padding:20px;background:rgba(10,10,20,0.85);border-radius:20px;border:2px solid gold;box-shadow:0 0 30px rgba(255,215,0,0.4);}
  h2{text-align:center;font-size:28px;color:gold;margin-bottom:15px;text-shadow:0 0 10px gold;}
  .entry{display:flex;align-items:center;background:rgba(255,255,255,0.05);margin-bottom:10px;padding:10px 15px;border-radius:10px;}
  .place{font-size:30px;font-weight:700;width:40px;}
  .place-1{color:#ffd700;}.place-2{color:silver;}.place-3{color:#cd7f32;}
  .name{flex:1;font-size:24px;font-weight:600;margin-left:10px;}
  .sum{font-size:24px;color:gold;font-weight:700;}
</style>
</head>
<body>
<div class="widget">
  <h2>🏆 Топ донатеров</h2>
  <div id="board">Загрузка...</div>
</div>
<script>
  const CSV_URLS = [
    'https://docs.google.com/spreadsheets/d/e/2PACX-1vSt7iz-7l-uCsjQYfZXkskIrNthe20Mxs0f9sUxEFI8QihTXOSGpNsjmC4vRE_OdXoVclNRNgIT7RTm/pub?gid=865616681&single=true&output=csv',
    'https://docs.google.com/spreadsheets/d/e/2PACX-1vSt7iz-7l-uCsjQYfZXkskIrNthe20Mxs0f9sUxEFI8QihTXOSGpNsjmC4vRE_OdXoVclNRNgIT7RTm/pub?gid=1115599664&single=true&output=csv'
  ];

  function parseCSV(str) {
    const rows = [];
    let curRow = [], curField = '', quoted = false;
    for (const ch of str) {
      if (quoted) {
        if (ch === '"') quoted = false;
        else curField += ch;
      } else {
        if (ch === '"') quoted = true;
        else if (ch === ',') { curRow.push(curField.trim()); curField = ''; }
        else if (ch === '\n' || ch === '\r') {
          if (curField || curRow.length) {
            curRow.push(curField.trim());
            rows.push(curRow);
            curRow = []; curField = '';
          }
          if (ch === '\r' && str[str.indexOf(ch)+1] === '\n') continue;
        } else curField += ch;
      }
    }
    if (curField || curRow.length) { curRow.push(curField.trim()); rows.push(curRow); }
    return rows.filter(r => r.some(c => c !== ''));
  }

  async function update() {
    try {
      const results = await Promise.all(CSV_URLS.map(u => fetch(u + '?t=' + Date.now()).then(r => r.text())));
      const all = [];
      results.forEach(rows => {
        let start = 0;
        if (rows.length && rows[0].some(c => /имя|ник|name/i.test(c))) start = 1;
        for (let i = start; i < rows.length; i++) {
          const row = rows[i];
          const name = row[1]?.trim();
          const amount = parseFloat(row[2]?.replace(',', '.'));
          if (name && !isNaN(amount) && amount > 0) all.push({name, amount});
        }
      });
      const totals = {};
      all.forEach(d => { totals[d.name] = (totals[d.name] || 0) + d.amount; });
      const top = Object.entries(totals).sort((a,b) => b[1] - a[1]).slice(0,3).map(([name,sum]) => ({name,sum}));
      const board = document.getElementById('board');
      if (!top.length) { board.innerHTML = 'Нет данных'; return; }
      const medals = ['🥇','🥈','🥉'];
      board.innerHTML = top.map((item,i) => `<div class="entry"><span class="place place-${i+1}">${medals[i]}</span><span class="name">${item.name}</span><span class="sum">${item.sum.toLocaleString()} ₽</span></div>`).join('');
    } catch(e) {
      document.getElementById('board').innerHTML = 'Ошибка';
      console.error(e);
    }
  }
  update();
  setInterval(update, 5000);
</script>
</body>
</html>
